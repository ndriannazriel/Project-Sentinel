name: Sentinel Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build the Docker image
        run: docker build -t sentinel-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # This fails the build if vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ... (keep your existing build-and-scan job)

  push-to-registry:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan # THE SECURITY GATE: Only runs if scans pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Replaces 'latest' with a unique version based on the commit ID.
          tags: ${{ secrets.DOCKER_USERNAME }}/sentinel-app:latest, ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: push-to-registry # Only deploy after the image successfully pushes to Docker Hub
    steps:
      - name: SSH into EC2, Pull Image, and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Pull the new image from Docker Hub using the unique commit SHA
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}
            
            # 2. Stop and remove the old container if it exists
            sudo docker stop sentinel-container || true
            sudo docker rm sentinel-container || true
            
            # 3. Run the new container, mapped to port 80 (Standard Web Port)
            sudo docker run -d --name sentinel-container -p 80:3000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}

            # 4. Clean up old dangling Docker images to save disk space
            sudo docker image prune -f
