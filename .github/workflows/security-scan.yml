name: Sentinel Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build the Docker image
        run: docker build -t sentinel-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # This fails the build if vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ... (keep your existing build-and-scan job)

  push-to-registry:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan # THE SECURITY GATE: Only runs if scans pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Replaces 'latest' with a unique version based on the commit ID.
          tags: ${{ secrets.DOCKER_USERNAME }}/sentinel-app:latest, ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: push-to-registry # Only deploy after the image successfully pushes to Docker Hub
    steps:
      - name: SSH into EC2, Pull Image, and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Create a private Docker network
            sudo docker network create sentinel-net || true

            # 2. Pull the new image from Docker Hub
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}
            
            # 3. Stop and remove the old containers
            sudo docker stop sentinel-container nginx grafana prometheus node-exporter || true
            sudo docker rm sentinel-container nginx grafana prometheus node-exporter || true
            
            # 4. Run the App container (NO PORT EXPOSED, securely on sentinel-net)
            sudo docker run -d --name sentinel-container --network sentinel-net --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/sentinel-app:${{ github.sha }}

            # 5. Clean up old dangling Docker images
            sudo docker image prune -f

            # ---- PHASE 2: MONITORING (SOC Analyst Step) ----
            # A. Create Prometheus Configuration File
            sudo mkdir -p /etc/prometheus
            sudo bash -c 'cat <<EOF > /etc/prometheus/prometheus.yml
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: "node_exporter"
                static_configs:
                  - targets: ["172.17.0.1:9100"] # 172.17.0.1 reaches the host machine
              - job_name: "prometheus"
                static_configs:
                  - targets: ["localhost:9090"]
            EOF'

            # B. Deploy Node Exporter (Must be on host network)
            sudo docker run -d --name node-exporter --net="host" --pid="host" -v "/:/host:ro,rslave" --restart unless-stopped prom/node-exporter:latest --path.rootfs=/host

            # C. Deploy Prometheus (Securely on sentinel-net)
            sudo docker run -d --name prometheus --network sentinel-net -p 9090:9090 -v /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml --restart unless-stopped prom/prometheus:latest

            # D. Deploy Grafana (Securely on sentinel-net)
            sudo docker run -d --name grafana --network sentinel-net -e "GF_SECURITY_ADMIN_PASSWORD=admin" --restart unless-stopped grafana/grafana:latest

            # ---- PHASE 3: REVERSE PROXY (The Nginx Traffic Cop) ----
            # Creating the Nginx routing rules
            sudo mkdir -p /etc/nginx
            sudo bash -c 'cat <<EOF > /etc/nginx/nginx.conf
            events {}
            http {
                server {
                    listen 80;
                    server_name project-sentienl.azrieln.my; # <--- CHANGE THIS later to your actual domain

                    location / {
                        proxy_pass http://sentinel-container:3000; 
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                }
                server {
                    listen 80;
                    server_name grafana-soc.azrieln.my; # <--- CHANGE THIS later to your actual domain

                    location / {
                        proxy_pass http://grafana:3000;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                }
            }
            EOF'

            # Start Nginx (The only container exposing Port 80 to the world)
            sudo docker run -d --name nginx --network sentinel-net -p 80:80 -v /etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro --restart unless-stopped nginx:latest
